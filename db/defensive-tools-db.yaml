    binary: lynis
    description: "Security auditing tool and hardening utility for Linux systems"
    packages:
      apt: lynis
      dnf: lynis
      pacman: lynis
      zypper: lynis
    tags: [auditing, hardening, assessment, cis-compliance]
    metrics:
      estimated_size_mb: 1.2
      dependencies_size_mb: 2.0
      ram_required_mb: 64
    dependencies: []
    install_source: pkg
    run_via: kjer
    run_cmd: [lynis, audit, system, --no-colors, --quiet]
    config_file: /etc/lynis/default.prf
    
  aide:
    binary: aide
    description: "Advanced Intrusion Detection Environment - file integrity monitoring"
    packages:
      apt: aide aide-common
      dnf: aide
      pacman: aide
      zypper: aide
    tags: [file-integrity, fim, detection, compliance]
    metrics:
      estimated_size_mb: 0.8
      dependencies_size_mb: 3.5
      ram_required_mb: 256
    dependencies: []
    install_source: pkg
    run_via: kjer
    run_cmd: [aide, --check]
    config_file: /etc/aide/aide.conf
    
  tiger:
    binary: tiger
    description: "TIGER - Security checking tool for Unix systems"
    packages:
      apt: tiger
      dnf: tiger
      pacman: tiger
      zypper: tiger
    tags: [security-checking, hardening, assessment]
    metrics:
      estimated_size_mb: 0.6
      dependencies_size_mb: 2.0
      ram_required_mb: 96
    dependencies: [gawk, grep, perl]
    install_source: pkg
    run_via: kjer
    run_cmd: [tiger]
    
  tripwire:
    binary: tripwire
    description: "File integrity checking and system monitoring tool"
    packages:
      apt: tripwire
      dnf: tripwire
      pacman: tripwire
      zypper: tripwire
    tags: [file-integrity, fim, detection, compliance]
    metrics:
      estimated_size_mb: 1.0
      dependencies_size_mb: 2.5
      ram_required_mb: 128
    dependencies: []
    install_source: pkg
    run_via: kjer
    run_cmd: [tripwire, --check]
    config_file: /etc/tripwire/tw.pol

# Event Auditing Tools
auditing:
  auditd:
    binary: auditctl
    description: "Linux audit framework for monitoring system calls and security events"
    packages:
      apt: auditd audispd-plugins
      dnf: audit
      pacman: audit
      zypper: audit
    tags: [auditing, monitoring, logging, forensics]
    metrics:
      estimated_size_mb: 0.5
      dependencies_size_mb: 1.5
      ram_required_mb: 128
    dependencies: []
    install_source: pkg
    run_via: daemon
    service_name: auditd
    config_file: /etc/audit/audit.rules
    
# EDR/Detection Tools
edr:
  clamav:
    binary: clamscan
    description: "Open-source antivirus engine - malware detection and removal"
    packages:
      apt: clamav clamav-daemon clamav-freshclam
      dnf: clamav clamav-daemon clamav-freshclam
      pacman: clamav
      zypper: clamav clamav-daemon
    tags: [antivirus, malware-detection, edr, scanning]
    metrics:
      estimated_size_mb: 100.0
      dependencies_size_mb: 150.0
      ram_required_mb: 512
    dependencies: [curl, wget]
    install_source: pkg
    run_via: kjer
    run_cmd: [clamscan, -r, --infected, --no-summary, /home, /tmp, /var/tmp]
    virus_db: /var/lib/clamav/

# Monitoring/Response Tools
monitoring:
  osquery:
    binary: osqueryi
    description: "Operating system instrumentation framework - query system data"
    packages:
      apt: osquery
      dnf: osquery
      pacman: osquery
      zypper: osquery
    tags: [monitoring, osint, forensics, detection]
    metrics:
      estimated_size_mb: 30.0
      dependencies_size_mb: 20.0
      ram_required_mb: 256
    dependencies: []
    install_source: repo
    run_via: direct
    run_cmd: [osqueryi, '--json', 'SELECT name,pid,path FROM processes WHERE on_disk=0 LIMIT 20;']
    config_file: /etc/osquery/osquery.conf

# Extra Defense Tools
  selinux:
    binary: sestatus
    # sestatus belongs to policycoreutils (a system dep that is never removed).
    # active_check_pattern ensures we verify enforcement is ON, not just that
    # the binary exists on PATH after selinux packages have been uninstalled.
    active_check_pattern: "SELinux status:\\s+enabled"
    description: "Security-Enhanced Linux mandatory access control (NSA)"
    packages:
      apt: selinux-basics selinux-policy-default
      dnf: selinux-policy selinux-policy-targeted
    tags: [mac, mandatory-access-control, defense, hardening]
    metrics:
      estimated_size_mb: 15
      dependencies_size_mb: 50
      ram_required_mb: 128
    dependencies: []
    install_source: pkg
    run_via: kjer
    run_cmd: [sestatus]
    config_file: /etc/selinux/config

# Network Security Monitoring Tools
network:
  wireshark:
    binary: tshark
    description: "Network protocol analyzer and packet capture tool"
    packages:
      apt: wireshark tshark
      dnf: wireshark
      pacman: wireshark-cli
      zypper: wireshark
    tags: [network-analysis, packet-capture, monitoring, forensics]
    metrics:
      estimated_size_mb: 120
      dependencies_size_mb: 50
      ram_required_mb: 512
    dependencies: []
    install_source: pkg
    run_via: direct
    run_cmd: [tshark, -D]

  suricata:
    binary: suricata
    description: "Open source IDS/IPS and network security monitoring engine"
    packages:
      apt: suricata
      dnf: suricata
      pacman: suricata
      zypper: suricata
    tags: [ids, ips, network-monitoring, detection]
    metrics:
      estimated_size_mb: 180
      dependencies_size_mb: 100
      ram_required_mb: 512
    dependencies: []
    install_source: pkg
    run_via: daemon
    service_name: suricata
    config_file: /etc/suricata/suricata.yaml

  zeek:
    binary: zeek
    description: "Network security monitoring framework - protocol analysis and logging"
    packages:
      apt: zeek
      dnf: zeek
    tags: [network-monitoring, ids, detection, nsm]
    metrics:
      estimated_size_mb: 280
      dependencies_size_mb: 100
      ram_required_mb: 1024
    dependencies: []
    install_source: repo
    repo_setup:
      apt:
        gpg_url: "https://download.opensuse.org/repositories/security:/zeek/xUbuntu_{DISTRO_VERSION}/Release.key"
        gpg_dest: "/etc/apt/trusted.gpg.d/zeek.gpg"
        repo_line: "deb [signed-by=/etc/apt/trusted.gpg.d/zeek.gpg] http://download.opensuse.org/repositories/security:/zeek/xUbuntu_{DISTRO_VERSION}/ /"
        repo_file: "/etc/apt/sources.list.d/zeek.list"
        version_fallbacks: ["24.04", "22.04", "20.04"]
    run_via: daemon
    service_name: zeek

# SIEM / Log Management Tools
siem:
  elastic-stack:
    binary: elasticsearch
    description: "Elasticsearch + Logstash + Kibana - open source SIEM and log management"
    packages:
      apt: elasticsearch logstash kibana
    tags: [siem, log-management, monitoring, detection]
    metrics:
      estimated_size_mb: 950
      dependencies_size_mb: 200
      ram_required_mb: 4096
    dependencies: []
    install_source: repo
    repo_setup:
      apt:
        gpg_url: "https://artifacts.elastic.co/GPG-KEY-elasticsearch"
        gpg_dest: "/usr/share/keyrings/elasticsearch-keyring.gpg"
        repo_line: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] https://artifacts.elastic.co/packages/8.x/apt stable main"
        repo_file: "/etc/apt/sources.list.d/elastic-8.x.list"
    run_via: daemon
    service_name: elasticsearch

  splunk:
    binary: splunk
    description: "Splunk Enterprise - data analytics and SIEM platform"
    packages: {}
    tags: [siem, log-management, monitoring, analytics]
    metrics:
      estimated_size_mb: 1200
      dependencies_size_mb: 0
      ram_required_mb: 4096
    dependencies: []
    install_source: download
    download_install:
      linux_amd64:
        url: "https://download.splunk.com/products/splunk/releases/9.3.2/linux/splunk-9.3.2-d8d57d6aefda-linux-2.6-amd64.deb"
        method: dpkg
        filename: "splunk.deb"
        size_hint_mb: 1200
        install_page: "https://www.splunk.com/en_us/download/splunk-enterprise.html"
    run_via: daemon
    service_name: splunk

